<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass-panel">
            <h1>Battery Management System</h1>
            <div class="status-indicator">
                <span id="connectionStatus" class="status-dot">●</span>
                <span id="connectionText">Disconnected</span>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Battery Parameters Card -->
            <section class="glass-panel parameters-card">
                <h2>Battery Parameters</h2>
                <div class="parameters-grid">
                    <div class="parameter-item">
                        <div class="parameter-label">Voltage</div>
                        <div class="parameter-value">
                            <span id="voltage">--</span>
                            <span class="parameter-unit">V</span>
                        </div>
                        <div class="parameter-bar">
                            <div id="voltageBar" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="parameter-item">
                        <div class="parameter-label">Current</div>
                        <div class="parameter-value">
                            <span id="current">--</span>
                            <span class="parameter-unit">A</span>
                        </div>
                        <div class="parameter-bar">
                            <div id="currentBar" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="parameter-item">
                        <div class="parameter-label">Temperature</div>
                        <div class="parameter-value">
                            <span id="temperature">--</span>
                            <span class="parameter-unit">°C</span>
                        </div>
                        <div class="parameter-bar">
                            <div id="tempBar" class="bar-fill"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- State and Control Card -->
            <section class="glass-panel control-card">
                <h2>Battery Control</h2>
                <div class="state-display">
                    <div class="state-label">Current State</div>
                    <div id="state" class="state-value">--</div>
                </div>
                <div class="warning-display">
                    <div class="warning-label">Warning</div>
                    <div id="warning" class="warning-value">Nominal</div>
                </div>
                <div class="control-buttons">
                    <button id="chargeBtn" class="control-btn charge-btn">Start Charging</button>
                    <button id="dischargeBtn" class="control-btn discharge-btn">Start Discharging</button>
                    <button id="stopBtn" class="control-btn stop-btn">Stop</button>
                </div>
            </section>

            <!-- Data Input Form -->
            <section class="glass-panel input-card">
                <h2>Update Battery Data</h2>
                <form id="dataForm" class="data-form">
                    <div class="form-group">
                        <label for="voltageInput">Voltage (V):</label>
                        <input type="number" id="voltageInput" step="0.1" min="0" max="5" required>
                    </div>
                    <div class="form-group">
                        <label for="currentInput">Current (A):</label>
                        <input type="number" id="currentInput" step="0.1" min="-2" max="2" required>
                    </div>
                    <div class="form-group">
                        <label for="tempInput">Temperature (°C):</label>
                        <input type="number" id="tempInput" step="1" min="-40" max="85" required>
                    </div>
                    <button type="submit" class="submit-btn">Update Data</button>
                </form>
            </section>
        </main>

        <!-- Footer -->
        <footer class="glass-panel">
            <p>Battery Management System v1.0 | Real-time Monitoring</p>
        </footer>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Notification</h3>
            <p id="modalMessage">Message</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
